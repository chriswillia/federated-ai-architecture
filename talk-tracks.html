<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Talk tracks &mdash; moved to the homepage</title>
    <meta name="robots" content="noindex" />
    <script>
      (() => {
        try {
          const incoming = new URL(window.location.href).searchParams;
          const target = new URL("index.html", window.location.href);
          for (const [k, v] of incoming) target.searchParams.set(k, v);
          target.hash = "#conversation";
          window.location.replace(target.toString());
        } catch (e) {
          window.location.replace("index.html#conversation");
        }
      })();
    </script>
    <meta http-equiv="refresh" content="0; url=index.html#conversation" />
    <style>
      body { font-family: "Segoe UI", -apple-system, BlinkMacSystemFont, Arial, sans-serif; margin: 40px; color: #333; }
      a { color: #464feb; }
    </style>
  </head>
  <body>
    <p>The talk tracks &amp; objections toolkit now lives on the
      <a href="index.html#conversation">homepage &mdash; &ldquo;Talk to your customer&rdquo; section</a>.</p>
  </body>
</html>
